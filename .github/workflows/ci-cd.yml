name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

# One deploy at a time; cancel superseded in-progress CI runs per ref.
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Builds happen HERE, on GitHub's runners, never on the prod VM: the 1 GB
  # box swap-thrashed itself to death on 2026-07-10 and docker builds are its
  # biggest memory spike. Pushes to main publish the image to GHCR; the deploy
  # job below only pulls. PRs still build (verification only, no push).
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image (push to GHCR on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build]
    # Only deploy real pushes to main, never PRs.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # The `oracle` label pins this to the production runner on the Oracle VM.
    runs-on: [self-hosted, oracle]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Pull latest main and redeploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd "$HOME/servers/rbga"
          # First run bootstraps the deploy dir into a git checkout. .env and
          # data/ are gitignored, so reset --hard never touches them.
          if [ ! -d .git ]; then
            git init -b main
            git remote add origin "https://github.com/${{ github.repository }}.git"
          fi
          # Authenticate the fetch with the job's ephemeral token (not persisted
          # to .git/config; passed per-command via -c).
          AUTH=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)
          git -c http.https://github.com/.extraheader="AUTHORIZATION: basic $AUTH" fetch --all --prune
          git reset --hard origin/main
          # Pull the image the build job just published — NO building on this
          # 1 GB box (a build's memory spike can take the whole host down).
          echo "$GH_TOKEN" | docker login ghcr.io -u x-access-token --password-stdin
          docker compose pull api bot
          # Apply DB migrations before starting services, so the schema is ready
          # before api/bot come up (and a bad migration fails the deploy here).
          docker compose run --rm api alembic upgrade head
          # The caddy profile is on in production (public HTTPS); the bot's
          # DISCORD_TOKEN is configured in .env, so this brings up everything.
          docker compose --profile caddy up -d
          # Old image layers otherwise pile up forever on the 47 GB disk.
          docker image prune -f
          docker logout ghcr.io
      - name: Health check
        run: |
          for i in $(seq 1 20); do
            if curl -fsS -o /dev/null http://localhost:30010/health; then echo "healthy"; exit 0; fi
            sleep 2
          done
          echo "health check failed"; docker logs --tail 40 rbga-api; exit 1
