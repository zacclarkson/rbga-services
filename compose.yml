# One image, two processes (api + bot), one Postgres. This is the whole
# "modular monolith" — see CLAUDE.md. Follows the ~/servers/<name>/ pattern
# used on the Debian box: no host port on the DB, cloudflared fronts the API.
services:
  db:
    image: postgres:16-alpine
    container_name: rbga-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    # deliberately no host port — only api/bot on this network reach it

  api:
    build: .
    container_name: rbga-api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL}
      COMPLAINTS_SCHEMA: ${COMPLAINTS_SCHEMA:-}
      COMPLAINTS_API_TOKEN: ${COMPLAINTS_API_TOKEN}
      COMPLAINTS_RETENTION_DAYS: ${COMPLAINTS_RETENTION_DAYS:-}
      RBGA_API_TOKEN: ${RBGA_API_TOKEN:-}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}
    command: uvicorn rbga.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "30010:8000" # cloudflared ingress -> localhost:30010

  bot:
    build: .
    container_name: rbga-bot
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      DISCORD_KEYS_ROLE: ${DISCORD_KEYS_ROLE:-}
      BGG_API_TOKEN: ${BGG_API_TOKEN:-}
      PYTHONUNBUFFERED: "1"  # so the bot's print() output reaches docker logs
    command: python -m rbga.bot
