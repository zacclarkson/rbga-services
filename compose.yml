# One image, two processes (api + bot), one Postgres. This is the whole
# "modular monolith"; see README.md. Follows the ~/servers/<name>/ pattern
# used on the deploy host (docs/deploy.md): no host port on the DB, a reverse
# proxy or tunnel fronts the API.

# Every service gets a log cap and a hard memory cap (mem_limit ==
# memswap_limit, so a runaway container is OOM-killed at its cap and revived
# by its restart policy instead of dragging the 1 GB prod host into swap —
# that host froze outright on 2026-07-10). Caps are generous ceilings:
# steady-state usage is ~30-90 MiB per container.
x-logging: &log-cap
  driver: json-file
  options: { max-size: "10m", max-file: "3" }

services:
  db:
    image: postgres:16-alpine
    container_name: rbga-db
    restart: unless-stopped
    command: postgres -c shared_buffers=64MB -c max_connections=20
    mem_limit: 300m
    memswap_limit: 300m
    logging: *log-cap
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    # deliberately no host port: only api/bot on this network reach it

  api:
    # Built in CI and pulled on the prod box (which must never build: docker
    # builds have OOM'd the 1 GB host). `build:` stays for local dev
    # (`docker compose up --build`). RBGA_IMAGE_TAG pins a rollback.
    image: ghcr.io/rmit-bga/rbga-services:${RBGA_IMAGE_TAG:-latest}
    build: .
    container_name: rbga-api
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    logging: *log-cap
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL}
      COMPLAINTS_SCHEMA: ${COMPLAINTS_SCHEMA:-}
      COMPLAINTS_API_TOKEN: ${COMPLAINTS_API_TOKEN}
      COMPLAINTS_RETENTION_YEARS: ${COMPLAINTS_RETENTION_YEARS:-}
      COMPLAINTS_RATE_LIMIT: ${COMPLAINTS_RATE_LIMIT:-}
      RBGA_API_TOKEN: ${RBGA_API_TOKEN:-}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}
    command: uvicorn rbga.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "30010:8000" # cloudflared ingress -> localhost:30010

  bot:
    image: ghcr.io/rmit-bga/rbga-services:${RBGA_IMAGE_TAG:-latest}
    build: .
    container_name: rbga-bot
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    logging: *log-cap
    depends_on:
      - db
    environment:
      # The bot uses its own least-privilege role (no complaints access, policy
      # §9). Falls back to the main URL for local/dev where isolation is moot.
      DATABASE_URL: ${BOT_DATABASE_URL:-${DATABASE_URL}}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      DISCORD_KEYS_ROLE: ${DISCORD_KEYS_ROLE:-}
      BGG_API_TOKEN: ${BGG_API_TOKEN:-}
      # Complaints handling: the bot reaches complaints via the API (reviewer
      # token), never the DB, so its restricted DB role is unchanged.
      RBGA_API_BASE_URL: ${RBGA_API_BASE_URL:-http://api:8000}
      COMPLAINTS_API_TOKEN: ${COMPLAINTS_API_TOKEN:-}
      # Routing targets are normally set at runtime via /complaints-setup; these
      # are an optional fallback.
      COMPLAINTS_COMMITTEE_CHANNEL_ID: ${COMPLAINTS_COMMITTEE_CHANNEL_ID:-}
      COMPLAINTS_EXEC_CHANNEL_ID: ${COMPLAINTS_EXEC_CHANNEL_ID:-}
      COMPLAINTS_PRESIDENT_USER_ID: ${COMPLAINTS_PRESIDENT_USER_ID:-}
      COMPLAINTS_ADMIN_ROLE: ${COMPLAINTS_ADMIN_ROLE:-}
      COMPLAINTS_POLL_SECONDS: ${COMPLAINTS_POLL_SECONDS:-60}
      PYTHONUNBUFFERED: "1"  # so the bot's print() output reaches docker logs
    command: python -m rbga.bot

  # Optional reverse proxy with automatic HTTPS (Let's Encrypt), for hosting the
  # API on a box with a public IP + a domain, e.g. the Oracle move with a free
  # DuckDNS subdomain. NOT started by default (the home box uses cloudflared on
  # :30010 instead); opt in with `docker compose --profile caddy up -d`.
  # Needs CADDY_DOMAIN set to a name that resolves to this host, and ports 80/443
  # open (OCI security list + the instance firewall).
  caddy:
    image: caddy:2
    container_name: rbga-caddy
    restart: unless-stopped
    mem_limit: 96m
    memswap_limit: 96m
    logging: *log-cap
    profiles: ["caddy"]
    depends_on:
      - api
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data      # issued certs; persist so they survive restarts
      - ./data/caddy-config:/config
